<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Dazu Beauty Shop - Tu tienda de belleza. Catalogo de cremas, shampoos y productos de cuidado personal." />
  <title>Dazu Beauty Shop</title>
  <link rel="icon" type="image/jpeg" href="assets/logo-rosa.jpeg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .landing-flowers {
      position: absolute;
      font-size: 2rem;
      opacity: 0.12;
      pointer-events: none;
      animation: float 4s ease-in-out infinite;
    }
    .f1 { top: 8%; left: 6%; --rot: -15deg; transform: rotate(-15deg); animation-delay: 0s; }
    .f2 { top: 15%; right: 8%; --rot: 20deg; transform: rotate(20deg); font-size: 1.6rem; animation-delay: 0.7s; }
    .f3 { bottom: 20%; left: 4%; --rot: 10deg; font-size: 1.5rem; transform: rotate(10deg); animation-delay: 1.4s; }
    .f4 { bottom: 10%; right: 10%; --rot: -20deg; transform: rotate(-20deg); animation-delay: 2.1s; }
    .f5 { top: 45%; left: 2%; --rot: 0deg; font-size: 1.2rem; animation-delay: 0.5s; }
    .f6 { top: 55%; right: 3%; --rot: 30deg; font-size: 1.3rem; transform: rotate(30deg); animation-delay: 1.8s; }
  </style>
</head>
<body>
  <main class="landing">
    <!-- Decorative flowers -->
    <div class="landing-flowers f1">🌸</div>
    <div class="landing-flowers f2">✨</div>
    <div class="landing-flowers f3">💫</div>
    <div class="landing-flowers f4">🌺</div>
    <div class="landing-flowers f5">🌹</div>
    <div class="landing-flowers f6">💎</div>

    <div class="landing-content">
      <div class="landing-hero-logo">
        <img src="assets/logo-rosa.jpeg" alt="Dazu Beauty Shop" class="landing-logo-img" />
      </div>

      <p class="landing-subtitle">Tu tienda de belleza</p>

      <a href="catalogo.html" class="btn-catalog">
        <span>🛍️</span>
        Ver catálogo
      </a>
    </div>

    <!-- Discrete admin link (bottom-right corner) -->
    <a href="admin.html" class="landing-admin-link" title="Panel de administración">
      ⚙️ <span>Admin</span>
    </a>
  </main>
</body>
</html>
