<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dazu Beauty Shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .landing-flowers {
      position: absolute;
      font-size: 2rem;
      opacity: 0.12;
      pointer-events: none;
    }
    .f1 { top: 8%; left: 6%; transform: rotate(-15deg); }
    .f2 { top: 15%; right: 8%; transform: rotate(20deg); font-size: 1.6rem; }
    .f3 { bottom: 20%; left: 4%; font-size: 1.5rem; transform: rotate(10deg); }
    .f4 { bottom: 10%; right: 10%; transform: rotate(-20deg); }
    .f5 { top: 45%; left: 2%; font-size: 1.2rem; }
    .f6 { top: 55%; right: 3%; font-size: 1.3rem; transform: rotate(30deg); }
  </style>
</head>
<body>
  <main class="landing">
    <!-- Decorative flowers -->
    <div class="landing-flowers f1">🌸</div>
    <div class="landing-flowers f2">✨</div>
    <div class="landing-flowers f3">💫</div>
    <div class="landing-flowers f4">🌺</div>
    <div class="landing-flowers f5">🌹</div>
    <div class="landing-flowers f6">💎</div>

    <div class="landing-content">
      <div class="landing-logo">
        <span>🌸</span>
      </div>

      <h1 class="landing-title">Dazu<br>Beauty Shop</h1>
      <p class="landing-subtitle">Tu tienda de belleza ✨</p>

      <a href="catalogo.html" class="btn-catalog">
        <span>🛍️</span>
        Ver catálogo
      </a>
    </div>

    <!-- Discrete admin link (bottom-right corner) -->
    <a href="admin.html" class="landing-admin-link" title="Panel de administración">
      ⚙️ <span>Admin</span>
    </a>
  </main>
</body>
</html>
